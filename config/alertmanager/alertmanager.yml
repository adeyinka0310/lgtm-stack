global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'default'
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'default'
      group_wait: 60s
      repeat_interval: 4h

inhibit_rules:
  - source_match:
      alertname: 'ServerDown'
    target_match_re:
      alertname: 'HighCPUWarning|HighCPUCritical|HighMemoryWarning|HighMemoryCritical'
    equal: ['instance']

receivers:
  - name: 'default'
