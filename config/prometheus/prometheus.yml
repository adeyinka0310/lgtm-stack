global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node_exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "blackbox_http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://google.com
          - https://github.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "tempo-metrics"
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics

  - job_name: "demo-service"
    static_configs:
      - targets: ["172.17.0.1:5000"]
    metrics_path: /metrics

  - job_name: "dora-collector"
    static_configs:
      - targets: ["172.17.0.1:8090"]
    metrics_path: /metrics

  - job_name: "dora-collector"
    static_configs:
      - targets: ["172.17.0.1:8090"]
    metrics_path: /metrics
